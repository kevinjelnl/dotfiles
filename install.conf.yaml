- defaults:
    link:
      relink: true

- clean: ['~', '~/.vim']

- shell:
  - [git submodule update --init --recursive, Installing submodules]
  - [bash ./font/install_font.sh]
  - [rsync -a ./kitty.conf ~/.config/kitty/kitty.conf] 
  - [mkdir -p ~/.config/bat]

- link:
    ~/.bash:
    ~/.bash_profile:
    ~/.bashrc:
    ~/.dotfiles: ''
    ~/.shell:
    ~/.gitignore_global:
    ~/.tmux.conf: tmux.conf
    ~/.vim: vim
    ~/.vimrc: vimrc
    ~/.config/nvim: vim
    ~/.config/nvim/init.vim: vimrc
    ~/.bat.conf: bat.conf

