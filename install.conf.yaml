- defaults:
    link:
      relink: true

- clean: ['~', '~/.vim']

- link:
    ~/.bash:
    ~/.bash_profile:
    ~/.bashrc:
    ~/.dotfiles: ''
    ~/.shell:
    ~/.gitignore_global:
    ~/.tmux.conf: tmux.conf
    ~/.vim: vim
    ~/.vimrc: vimrc


- shell:
  - [git submodule update --init --recursive, Installing submodules]
