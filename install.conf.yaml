- defaults:
    link:
      create: true
      relink: true

- shell:
    - [git submodule update --init --recursive, Installing submodules]
    - [zsh ./font/install_font.sh]
    - [rsync -a ./kitty.conf ~/.config/kitty/kitty.conf]
    - [mkdir -p ~/.config/bat]

- link:
    ~/.zshrc: zsh/zshrc
    ~/.oh-my-zsh/themes/kevinjel.zsh-theme: zsh/kevinjel.zsh-theme
    ~/.config/zsh/setopt.zsh: zsh/setopt.zsh
    ~/.config/zsh/aliases.zsh: zsh/aliases.zsh
    ~/.config/zsh/functions.zsh: zsh/functions.zsh
    ~/.dotfiles: ""
    ~/.gitignore_global:
    ~/.tmux.conf: tmux.conf
    ~/.vim: vim
    ~/.vimrc: vimrc
    ~/.config/nvim: vim
    ~/.config/nvim/init.vim: vimrc
    ~/.bat.conf: bat.conf
    ~/.tmux/plugins/tpm: tmux-plugins

    ~/projects: ~/Sync/projects
    ~/.history: ~/Sync/workspace/terminal/.history

- clean: ["~", "~/.vim", ~/.config/]
